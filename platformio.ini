; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

board_build.flash_size = 16MB
board_build.flash_mode = qio
board_build.flash_freq = 80m

board_build.psram = enabled

build_flags = 
	-DBOARD_HAS_PSRAM
	-DCONFIG_SPIRAM_USE_MALLOC
	-DCONFIG_SPIRAM_ALLOW_BSS_SEG_EXTERNAL_MEMORY
	-DCONFIG_SPIRAM_ALLOW_NOINIT_SEG_EXTERNAL_MEMORY
	-O2
	-ffunction-sections
	-fdata-sections

lib_deps = 
	embeddronics-ltd/MS5837_30BA_Library@^1.0.0
	adafruit/Adafruit GFX Library@^1.12.1
	adafruit/Adafruit ST7735 and ST7789 Library@^1.11.0
	lewisxhe/SensorLib@^0.4.0
	claws/BH1750@^1.3.0
	tl5915/magnetometer_calibration@^1.1.1
	tl5915/Buehlmann ZHL-16C@^1.1.0
